<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Descarga Polo · Pendientes</title>
  <style>
    :root{
      --bg:#07131e;
      --surface:#0d202f;
      --line:#244357;
      --text:#eef6fa;
      --muted:#9bb3c2;
      --accent:#39b6a4;
      --warn:#f0ad4e;
      --shadow:0 14px 35px rgba(0,0,0,.25);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:linear-gradient(135deg,#06111a,#0b1d2a 55%,#07131e);
      color:var(--text);
      font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }
    .wrap{
      width:min(1480px,calc(100% - 32px));
      margin:0 auto;
      padding:28px 0 42px;
    }
    .top{
      text-align:center;
      margin-bottom:20px;
    }
    .eyebrow{
      font-size:11px;
      font-weight:800;
      letter-spacing:.14em;
      color:var(--accent);
      text-transform:uppercase;
    }
    h1{
      margin:3px 0 4px;
      font-size:clamp(26px,4vw,38px);
      letter-spacing:-.04em;
    }
    .subtitle{
      margin:0;
      color:var(--muted);
    }
    .card{
      background:rgba(13,32,47,.92);
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:var(--shadow);
      padding:15px;
    }
    .card-head{
      text-align:center;
      margin-bottom:12px;
    }
    .card-head h2{
      font-size:16px;
      margin:0;
    }
    .small{
      display:block;
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
    }
    .table-wrap{
      overflow:auto;
      max-height:calc(100vh - 200px);
      border:1px solid var(--line);
      border-radius:10px;
    }
    table{
      width:100%;
      min-width:900px;
      border-collapse:collapse;
      font-size:13px;
    }
    th{
      position:sticky;
      top:0;
      z-index:1;
      padding:11px 10px;
      background:#123248;
      color:#d9edf4;
      border-bottom:1px solid #2b5268;
      text-align:center;
      text-transform:uppercase;
      letter-spacing:.06em;
      font-size:10px;
    }
    td{
      padding:10px;
      border-bottom:1px solid rgba(42,76,97,.55);
      text-align:center;
      white-space:nowrap;
      vertical-align:middle;
    }
    tr:hover td{background:rgba(57,182,164,.06)}
    .estado{
      display:inline-block;
      padding:4px 9px;
      border-radius:99px;
      border:1px solid rgba(240,173,78,.45);
      background:rgba(240,173,78,.15);
      color:#ffd590;
      font-size:10px;
      font-weight:800;
      letter-spacing:.04em;
    }
    .empty{
      padding:52px 20px;
      text-align:center;
      color:var(--muted);
    }
    @media(max-width:650px){
      .wrap{width:min(100% - 22px,1480px);padding-top:18px}
      .table-wrap{max-height:calc(100vh - 185px)}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="top">
      <h1>Remitos FAS · Polo Logístico</h1>
      <p class="subtitle" id="subtitulo">Destino: POLO LOGÍSTICO</p>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>Remitos por descargar</h2>
        <span class="small" id="info">Cargando remitos por descargar...</span>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Remito</th>
              <th>Remito Creado</th>
              <th>Matrícula</th>
              <th>Origen</th>
              <th>Destino</th>
              <th>Cantidad</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        <div class="empty" id="empty" hidden>No hay remitos por descargar.</div>
      </div>
    </section>
  </main>

  <script>
    'use strict';

    const DROPBOX_URL = 'https://dl.dropbox.com/scl/fi/a4m66kwlcglp4h9l98ine/DescargaPolo.js?rlkey=wyy77chur0l5ow1emyr1bdat2&dl=1';

    const $ = id => document.getElementById(id);

    const clean = value => String(value ?? '').replace(/\s+/g, ' ').trim();

    const escapeHtml = value => String(value ?? '').replace(/[&<>'"]/g, char => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;'
    }[char]));

    const formatNum = value => {
      const number = Number(value);
      return Number.isFinite(number)
        ? new Intl.NumberFormat('es-UY', { maximumFractionDigits: 2 }).format(number)
        : '—';
    };

    function parseDate(value) {
      const text = clean(value);
      if (!text) return null;
      const date = new Date(text);
      return Number.isNaN(date.getTime()) ? null : date;
    }

    function formatDate(value) {
      const date = parseDate(value);
      return date
        ? new Intl.DateTimeFormat('es-UY', {
            day:'2-digit', month:'2-digit', year:'numeric',
            hour:'2-digit', minute:'2-digit'
          }).format(date).replace(',', '')
        : '—';
    }

    function getField(row, names) {
      for (const name of names) {
        if (Object.prototype.hasOwnProperty.call(row, name)) return row[name];
      }
      return '';
    }

    function extractPayload(text) {
      try {
        return JSON.parse(text);
      } catch {
        const start = text.indexOf('[');
        const end = text.lastIndexOf(']');
        if (start >= 0 && end > start) return JSON.parse(text.slice(start, end + 1));
        throw new Error('El archivo no contiene un arreglo JSON válido.');
      }
    }

    function extractRows(payload) {
      const rows = Array.isArray(payload) ? payload : payload?.datos;
      if (!Array.isArray(rows)) throw new Error('No se encontraron registros.');
      return rows;
    }

    function isPending(row) {
      const estado = clean(getField(row, ['ESTADO','Estado','estado'])).toLocaleUpperCase('es-UY');
      return estado === 'POR DESCARGAR';
    }

    function sortPending(rows) {
      return [...rows].sort((a, b) => {
        const aRemito = Number(getField(a, ['REMITO','Remito','remito']));
        const bRemito = Number(getField(b, ['REMITO','Remito','remito']));

        const aEsNumero = Number.isFinite(aRemito);
        const bEsNumero = Number.isFinite(bRemito);

        if (aEsNumero && bEsNumero) return aRemito - bRemito;
        if (aEsNumero) return -1;
        if (bEsNumero) return 1;

        return String(getField(a, ['REMITO','Remito','remito'])).localeCompare(
          String(getField(b, ['REMITO','Remito','remito'])),
          'es',
          { numeric: true }
        );
      });
    }

    function render(rows) {
      const pending = sortPending(rows.filter(isPending));
      const body = $('tableBody');
      const empty = $('empty');

      $('info').textContent = `${new Intl.NumberFormat('es-UY').format(pending.length)} remitos por descargar`;

      body.innerHTML = pending.map(row => {
        const remito = getField(row, ['REMITO','Remito','remito']);
        const registro = getField(row, ['REGISTRO','Registro','registro']);
        const origen = getField(row, ['ORIGEN','Origen','origen']);
        const destino = getField(row, ['DESTINO','Destino','destino']);
        const matricula = getField(row, ['MATRICULA','Matrícula','MATRÍCULA','Matricula','matricula']);
        const cantidad = getField(row, ['CANTIDAD','Cantidad','cantidad']);

        return `<tr>
          <td>${escapeHtml(remito || '—')}</td>
          <td>${escapeHtml(formatDate(registro))}</td>
          <td>${escapeHtml(matricula || '—')}</td>
          <td>${escapeHtml(origen || '—')}</td>
          <td>${escapeHtml(destino || '—')}</td>
          <td>${escapeHtml(formatNum(cantidad))}</td>
          <td><span class="estado">POR DESCARGAR</span></td>
        </tr>`;
      }).join('');

      empty.hidden = pending.length > 0;
    }

    async function loadData() {
      try {
        const response = await fetch(DROPBOX_URL, { cache:'no-cache' });
        if (!response.ok) throw new Error(`Dropbox respondió HTTP ${response.status}.`);

        const payload = extractPayload(await response.text());
        render(extractRows(payload));
        const ahora = new Intl.DateTimeFormat('es-UY', {
          day:'2-digit', month:'2-digit', year:'numeric',
          hour:'2-digit', minute:'2-digit', second:'2-digit'
        }).format(new Date()).replace(',', '');
        $('subtitulo').textContent = `Destino: POLO LOGÍSTICO · Actualizado: ${ahora}`;
      } catch (error) {
        console.error(error);
        $('info').textContent = 'No fue posible cargar los datos desde Dropbox.';
        $('tableBody').innerHTML = '';
        $('empty').hidden = false;
        $('empty').textContent = 'No fue posible cargar los remitos por descargar.';
      }
    }

    loadData();
  </script>
</body>
</html>
